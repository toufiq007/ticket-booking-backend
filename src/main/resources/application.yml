server:
  port: 4000

spring:
  application:
    name: booking

  datasource:
    url: jdbc:postgresql://localhost:5432/bookingDb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.ticket: DEBUG